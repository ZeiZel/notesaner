name: Release

# Triggered on semver tags (v1.2.3). Builds and pushes Docker images for each
# deployable app. Unlike the CI workflow, release builds always build ALL apps
# because a versioned release should be a complete, consistent artifact set.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  # ── Build all apps ─────────────────────────────────────────────────────────
  # Release builds compile ALL deployable apps regardless of what changed.
  # Build outputs are uploaded as artifacts for the Docker job.
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all apps
        run: pnpm nx run-many -t build --projects=web,server

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 1

      - name: Upload web static assets
        uses: actions/upload-artifact@v4
        with:
          name: web-static-assets
          path: |
            apps/web/.next/static
            apps/web/public
          retention-days: 1

  # ── Release Docker builds ───────────────────────────────────────────────────
  # Static matrix: on a release tag, every deployable app is built regardless
  # of what changed since the last commit. This guarantees that all images in
  # a release share the same version tag and are mutually consistent.
  docker:
    name: Docker (${{ matrix.app }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        # Add new deployable apps here as the project grows.
        app: [web, server]

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Download web static assets
        if: matrix.app == 'web'
        uses: actions/download-artifact@v4
        with:
          name: web-static-assets
          path: .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        # Strip the leading 'v' from the tag (v1.2.3 -> 1.2.3).
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.app }}.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/${{ matrix.app }}:latest
          # GitHub Actions cache scoped per app avoids cross-contamination
          # between web and server layer caches.
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
