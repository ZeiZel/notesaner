# Observability stack for local development
# Usage: docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# This adds Prometheus, Grafana, and Loki to the base dev services.
# Access:
#   Prometheus:  http://localhost:9090
#   Grafana:     http://localhost:3001  (admin / admin)
#   Loki:        http://localhost:3100  (push API for structured logs)

services:
  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    ports:
      - '9090:9090'
    volumes:
      - ./docs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docs/monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:9090/-/healthy']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_LOG_MODE: console
      GF_LOG_LEVEL: warn
    ports:
      - '3001:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docs/monitoring/grafana-provisioning:/etc/grafana/provisioning:ro
      - ./docs/monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/notesaner-server.json:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/api/health']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── Loki (log aggregation) ──────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.4.2
    command: '-config.file=/etc/loki/local-config.yaml'
    ports:
      - '3100:3100'
    volumes:
      - loki_data:/loki
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3100/ready']
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
