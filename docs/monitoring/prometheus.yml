# Prometheus scrape configuration for Notesaner
# ── Global settings ──────────────────────────────────────────────────────────

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# ── Alert rules ──────────────────────────────────────────────────────────────

rule_files:
  - 'alerts.yml'

# ── Alertmanager ─────────────────────────────────────────────────────────────

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # Uncomment when Alertmanager is deployed:
          # - targets: ['alertmanager:9093']

# ── Scrape targets ───────────────────────────────────────────────────────────

scrape_configs:
  # Notesaner NestJS backend
  - job_name: 'notesaner-server'
    scrape_interval: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:4000']
        labels:
          environment: 'development'
          service: 'notesaner-server'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node exporter (optional, for host-level metrics)
  # Uncomment when node-exporter is deployed:
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

  # PostgreSQL exporter (optional)
  # Uncomment when postgres-exporter is deployed:
  # - job_name: 'postgres-exporter'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
