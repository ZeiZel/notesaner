# Auto-provisioned Grafana dashboard providers
apiVersion: 1

providers:
  - name: Notesaner
    orgId: 1
    folder: Notesaner
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
