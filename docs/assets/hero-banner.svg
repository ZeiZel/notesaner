<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#141428;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a18;stop-opacity:1" />
    </linearGradient>
    <!-- Purple glow -->
    <radialGradient id="glow1" cx="35%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
    </radialGradient>
    <!-- Blue glow -->
    <radialGradient id="glow2" cx="75%" cy="40%" r="35%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0" />
    </radialGradient>
    <!-- Teal accent -->
    <radialGradient id="glow3" cx="60%" cy="80%" r="30%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0" />
    </radialGradient>
    <!-- Text gradient -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa" />
      <stop offset="40%" style="stop-color:#818cf8" />
      <stop offset="100%" style="stop-color:#38bdf8" />
    </linearGradient>
    <!-- Icon gradient -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#3b82f6" />
    </linearGradient>
    <!-- Subtle grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" stroke-opacity="0.04"/>
    </pattern>
    <!-- Glow filter -->
    <filter id="textGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Soft blur for orbs -->
    <filter id="orbBlur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGradient)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- Ambient glows -->
  <rect width="1200" height="300" fill="url(#glow1)"/>
  <rect width="1200" height="300" fill="url(#glow2)"/>
  <rect width="1200" height="300" fill="url(#glow3)"/>

  <!-- Decorative orbs -->
  <circle cx="420" cy="150" r="180" fill="#7c3aed" opacity="0.06" filter="url(#orbBlur)"/>
  <circle cx="850" cy="130" r="150" fill="#2563eb" opacity="0.07" filter="url(#orbBlur)"/>
  <circle cx="1100" cy="220" r="100" fill="#0891b2" opacity="0.08" filter="url(#orbBlur)"/>

  <!-- Graph network decoration (right side) -->
  <g opacity="0.15">
    <!-- Node connections -->
    <line x1="940" y1="80" x2="1020" y2="120" stroke="#818cf8" stroke-width="1"/>
    <line x1="1020" y1="120" x2="1100" y2="90" stroke="#818cf8" stroke-width="1"/>
    <line x1="1020" y1="120" x2="1080" y2="180" stroke="#818cf8" stroke-width="1"/>
    <line x1="1080" y1="180" x2="1140" y2="160" stroke="#38bdf8" stroke-width="1"/>
    <line x1="1080" y1="180" x2="1050" y2="230" stroke="#38bdf8" stroke-width="1"/>
    <line x1="940" y1="80" x2="960" y2="40" stroke="#818cf8" stroke-width="1"/>
    <line x1="1100" y1="90" x2="1150" y2="60" stroke="#818cf8" stroke-width="1"/>
    <line x1="1140" y1="160" x2="1170" y2="200" stroke="#38bdf8" stroke-width="1"/>
    <!-- Nodes -->
    <circle cx="940" cy="80" r="5" fill="#8b5cf6"/>
    <circle cx="1020" cy="120" r="7" fill="#818cf8"/>
    <circle cx="1100" cy="90" r="4" fill="#818cf8"/>
    <circle cx="1080" cy="180" r="6" fill="#38bdf8"/>
    <circle cx="1140" cy="160" r="4" fill="#38bdf8"/>
    <circle cx="1050" cy="230" r="5" fill="#7dd3fc"/>
    <circle cx="960" cy="40" r="3" fill="#a78bfa"/>
    <circle cx="1150" cy="60" r="3" fill="#a78bfa"/>
    <circle cx="1170" cy="200" r="3" fill="#7dd3fc"/>
  </g>

  <!-- Left decorative lines -->
  <g opacity="0.08">
    <line x1="0" y1="100" x2="80" y2="100" stroke="#818cf8" stroke-width="1"/>
    <line x1="0" y1="140" x2="60" y2="140" stroke="#818cf8" stroke-width="1"/>
    <line x1="0" y1="160" x2="40" y2="160" stroke="#818cf8" stroke-width="1"/>
    <line x1="0" y1="180" x2="70" y2="180" stroke="#38bdf8" stroke-width="1"/>
    <line x1="0" y1="200" x2="50" y2="200" stroke="#38bdf8" stroke-width="1"/>
  </g>

  <!-- App icon / logo mark -->
  <g transform="translate(130, 150)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="46" fill="none" stroke="url(#iconGradient)" stroke-width="1.5" opacity="0.4"/>
    <!-- Inner background -->
    <circle cx="0" cy="0" r="38" fill="#1e1b4b" opacity="0.8"/>
    <!-- N lettermark -->
    <g fill="url(#iconGradient)" filter="url(#textGlow)">
      <!-- Stylized "N" -->
      <rect x="-14" y="-18" width="5" height="36" rx="2"/>
      <rect x="9" y="-18" width="5" height="36" rx="2"/>
      <polygon points="-9,-18 -9,-8 14,18 14,8"/>
    </g>
    <!-- Accent dot -->
    <circle cx="22" cy="-22" r="4" fill="#38bdf8" opacity="0.9"/>
  </g>

  <!-- Main title -->
  <text
    x="210"
    y="135"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="62"
    font-weight="700"
    letter-spacing="-1.5"
    fill="url(#textGradient)"
    filter="url(#textGlow)"
  >Notesaner</text>

  <!-- Tagline -->
  <text
    x="212"
    y="172"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="18"
    font-weight="400"
    letter-spacing="0.5"
    fill="#94a3b8"
  >Web-first knowledge base with real-time collaboration</text>

  <!-- Separator line -->
  <line x1="212" y1="192" x2="720" y2="192" stroke="url(#textGradient)" stroke-width="1" opacity="0.3"/>

  <!-- Feature pills -->
  <g transform="translate(212, 215)">
    <!-- Pill 1: Open Source -->
    <rect x="0" y="0" width="108" height="28" rx="14" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.6"/>
    <text x="54" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#a78bfa">Open Source</text>

    <!-- Pill 2: Self-Hosted -->
    <rect x="118" y="0" width="100" height="28" rx="14" fill="#0c1a2e" stroke="#2563eb" stroke-width="1" stroke-opacity="0.6"/>
    <text x="168" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#60a5fa">Self-Hosted</text>

    <!-- Pill 3: Real-time Collab -->
    <rect x="228" y="0" width="138" height="28" rx="14" fill="#052e2e" stroke="#0891b2" stroke-width="1" stroke-opacity="0.6"/>
    <text x="297" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#22d3ee">Real-time Collab</text>

    <!-- Pill 4: Plugin SDK -->
    <rect x="376" y="0" width="98" height="28" rx="14" fill="#1a1a2e" stroke="#6366f1" stroke-width="1" stroke-opacity="0.6"/>
    <text x="425" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11.5" font-weight="500" fill="#818cf8">Plugin SDK</text>
  </g>

  <!-- Bottom subtle border -->
  <rect x="0" y="295" width="1200" height="5" fill="url(#textGradient)" opacity="0.4"/>

  <!-- License badge -->
  <g transform="translate(1040, 255)">
    <rect x="0" y="0" width="120" height="24" rx="4" fill="#1e1b4b" stroke="#4c1d95" stroke-width="0.5"/>
    <text x="60" y="16" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="#a78bfa">AGPL-3.0 License</text>
  </g>

  <!-- TypeScript badge -->
  <g transform="translate(1040, 222)">
    <rect x="0" y="0" width="120" height="24" rx="4" fill="#0c1a2e" stroke="#1e40af" stroke-width="0.5"/>
    <text x="60" y="16" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10.5" fill="#60a5fa">TypeScript Strict</text>
  </g>
</svg>
