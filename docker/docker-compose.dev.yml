# =============================================================================
# Notesaner — Dev services (web + server with hot-reload)
# Profile: dev
#
# Source code is bind-mounted from the host. node_modules and caches live in
# named volumes to avoid platform binary conflicts (macOS host vs Linux container).
#
# Usage:
#   docker compose --profile dev up -d      # Start postgres + redis + server + web
#   docker compose --profile dev logs -f    # Watch logs
#   docker compose --profile dev down       # Stop everything
# =============================================================================

services:
  # ─── NestJS Backend (dev mode with hot-reload) ────────────────────────────
  server-dev:
    build:
      context: ..
      dockerfile: docker/dev.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-notesaner}:${POSTGRES_PASSWORD:-notesaner}@postgres:5432/${POSTGRES_DB:-notesaner}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
      REDIS_DB: 0
      QUEUE_REDIS_HOST: redis
      QUEUE_REDIS_PORT: 6379
      QUEUE_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod-not-for-production}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-900}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL:-2592000}
      ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      STORAGE_ROOT: /data/notes
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # Disable OpenTelemetry in dev — no collector available
      OTEL_ENABLED: 'false'
      # Disable NX daemon — file watchers do not work well with bind mounts on macOS/Windows
      NX_DAEMON: 'false'
    volumes:
      # Bind-mount entire project root for hot-reload
      - ..:/app
      # Named volumes isolate platform-specific binaries and caches
      - dev_node_modules:/app/node_modules
      - dev_nx_cache:/app/.nx/cache
      - dev_notes_data:/data/notes
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://127.0.0.1:4000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    command: ['pnpm', 'nx', 'serve', 'server']
    profiles: ['dev']

  # ─── Next.js Frontend (dev mode with hot-reload) ──────────────────────────
  web-dev:
    build:
      context: ..
      dockerfile: docker/dev.Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: '0.0.0.0'
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
      NX_DAEMON: 'false'
      NEXT_TELEMETRY_DISABLED: '1'
    volumes:
      - ..:/app
      - dev_node_modules:/app/node_modules
      - dev_nx_cache:/app/.nx/cache
      - dev_next_cache:/app/apps/web/.next
    ports:
      - '3000:3000'
    depends_on:
      server-dev:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://127.0.0.1:3000 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    command: ['pnpm', 'nx', 'serve', 'web']
    profiles: ['dev']

volumes:
  dev_notes_data:
  dev_node_modules:
  dev_nx_cache:
  dev_next_cache:
