# =============================================================================
# Notesaner — Nginx Production Configuration
# =============================================================================
#
# Architecture:
#   [Internet] → nginx:443 (TLS termination)
#             → /api/* and /ws/*  → server:4000 (NestJS backend)
#             → everything else  → web:3000   (Next.js frontend)
#
# Features:
#   - HTTP → HTTPS redirect (301)
#   - TLS 1.2 / 1.3 only; strong cipher suites
#   - WebSocket proxy for Yjs CRDT real-time sync (/ws)
#   - Gzip compression for text assets
#   - Security headers (HSTS, X-Frame-Options, CSP, etc.)
#   - Nginx health endpoint for Docker health checks
#   - Log rotation friendly (json-file driver handles rotation)
#
# TLS certificates:
#   Place fullchain.pem and privkey.pem in the nginx_certs volume
#   (typically managed by certbot or an ACME sidecar):
#     /etc/nginx/certs/fullchain.pem
#     /etc/nginx/certs/privkey.pem
#
# =============================================================================

# Number of worker processes — auto-detects available CPU cores
worker_processes auto;

# Max open file descriptors per worker. Increase on high-traffic deployments.
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

events {
    # Max simultaneous connections per worker
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # ── MIME types ────────────────────────────────────────────────────────────
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    # Structured log format for ingestion by Loki / other log shippers
    log_format main escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Hide Nginx version from error pages and headers
    server_tokens off;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/wasm
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/xml
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # ── Rate limiting zones ────────────────────────────────────────────────────
    # 10 req/s per IP for API; burst allows short spikes
    limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=10r/s;
    # 30 req/s per IP for the frontend (static assets)
    limit_req_zone $binary_remote_addr zone=front_limit:10m rate=30r/s;

    # ── Upstream definitions ───────────────────────────────────────────────────
    upstream nextjs_backend {
        server web:3000;
        # keepalive connections to the upstream reduces TCP handshake overhead
        keepalive 32;
    }

    upstream nestjs_backend {
        server server:4000;
        keepalive 32;
    }

    # ── Shared proxy settings ─────────────────────────────────────────────────
    proxy_http_version     1.1;
    proxy_set_header       Host              $host;
    proxy_set_header       X-Real-IP         $remote_addr;
    proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header       X-Forwarded-Proto $scheme;
    proxy_set_header       X-Request-ID      $request_id;
    proxy_read_timeout     60s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;
    proxy_buffering        on;
    proxy_buffer_size      128k;
    proxy_buffers          4 256k;
    proxy_busy_buffers_size 256k;

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Nginx-level health check — does not depend on TLS
        location = /healthz {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Redirect all other traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server block ───────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2  on;
        server_name _;

        # ── TLS ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Restrict to TLS 1.2+ — TLS 1.0/1.1 are deprecated (RFC 8996)
        ssl_protocols TLSv1.2 TLSv1.3;

        # Strong cipher suites; ECDHE for forward secrecy
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # Session resumption — reduces TLS handshake overhead
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling — faster cert validation for clients
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver            1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout    5s;

        # ── Security headers ──────────────────────────────────────────────────
        # Enforce HTTPS for 1 year (preload: submit to HSTS preload list)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-Frame-Options           "SAMEORIGIN"                                   always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;
        # Basic CSP — tighten further based on the actual frontend needs
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss:; font-src 'self' data:; frame-ancestors 'none';"
            always;

        # ── Client upload limits ──────────────────────────────────────────────
        client_max_body_size 50m;

        # ── Health check endpoint (used by Docker health check) ───────────────
        location = /healthz {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ── WebSocket proxy for Yjs CRDT real-time sync ───────────────────────
        # Matches: /ws/*
        location /ws {
            proxy_pass http://nestjs_backend;

            # WebSocket upgrade handshake
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Long timeout for persistent WS connections
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 10s;

            # Disable buffering — essential for real-time streaming
            proxy_buffering off;
        }

        # ── NestJS API proxy ──────────────────────────────────────────────────
        # Matches: /api/* — all REST and Server-Sent Events endpoints
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;

            proxy_pass http://nestjs_backend;

            # Pass connection header for normal HTTP (not WS)
            proxy_set_header Connection "";
        }

        # ── Prometheus metrics endpoint (internal only) ───────────────────────
        # Deny external access; expose only to monitoring network
        location /metrics {
            deny all;
        }

        # ── Next.js static assets — long-lived cache ──────────────────────────
        location /_next/static/ {
            proxy_pass http://nextjs_backend;
            # Next.js hashes the filenames — these are safe to cache forever
            expires    1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Next.js image optimization endpoint ───────────────────────────────
        location /_next/image {
            proxy_pass http://nextjs_backend;
            expires    1h;
            add_header Cache-Control "public, stale-while-revalidate=86400";
        }

        # ── Frontend (Next.js) — everything else ──────────────────────────────
        location / {
            limit_req zone=front_limit burst=60 nodelay;
            limit_req_status 429;

            proxy_pass http://nextjs_backend;
            proxy_set_header Connection "";
        }
    }
}
