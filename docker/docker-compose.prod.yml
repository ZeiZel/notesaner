# =============================================================================
# Notesaner — Production Docker Compose
# =============================================================================
#
# Network topology:
#   frontend-net  — nginx <-> web (Next.js)
#   backend-net   — nginx <-> server (NestJS), server <-> postgres, server <-> redis
#
# Prerequisites:
#   1. Copy and configure environment:
#      cp docker/.env.example docker/.env && chmod 600 docker/.env
#   2. Place TLS certificates in the nginx_certs volume:
#      /etc/nginx/certs/fullchain.pem
#      /etc/nginx/certs/privkey.pem
#
# Usage:
#   docker compose -f docker/docker-compose.prod.yml --env-file docker/.env up -d
#
# Rolling update (zero-downtime):
#   docker compose -f docker/docker-compose.prod.yml --env-file docker/.env pull
#   docker compose -f docker/docker-compose.prod.yml --env-file docker/.env up -d --no-deps --build web server
#
# Rollback:
#   docker compose -f docker/docker-compose.prod.yml --env-file docker/.env up -d --no-deps <service>=<image:tag>
#
# Backup volumes:
#   docker run --rm -v notesaner-prod_postgres_data:/data -v $(pwd)/backups:/backup \
#     alpine tar czf /backup/postgres_data_$(date +%Y%m%d).tar.gz -C /data .
#   docker run --rm -v notesaner-prod_notes_data:/data -v $(pwd)/backups:/backup \
#     alpine tar czf /backup/notes_data_$(date +%Y%m%d).tar.gz -C /data .
# =============================================================================

name: notesaner-prod

# ---------------------------------------------------------------------------
# Named volumes — data that must survive container restarts/upgrades
# ---------------------------------------------------------------------------
volumes:
  # PostgreSQL WAL + data
  postgres_data:
    driver: local
  # Redis AOF + RDB snapshots
  redis_data:
    driver: local
  # Notes stored on disk (source of truth per architecture)
  notes_data:
    driver: local
  # Nginx TLS certificates managed externally (e.g. certbot, ACME)
  nginx_certs:
    driver: local
  # Nginx logs for log-rotation and audit
  nginx_logs:
    driver: local

# ---------------------------------------------------------------------------
# Networks — strict isolation between tiers
# ---------------------------------------------------------------------------
networks:
  # Public-facing: nginx + Next.js frontend
  frontend-net:
    driver: bridge
    internal: false
  # Private: nginx + NestJS + PostgreSQL + Redis. Never exposed to host.
  backend-net:
    driver: bridge
    internal: true

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:
  # ─── PostgreSQL 17 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: always
    env_file:
      - path: .env
        required: true
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Locale for deterministic collation
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Custom init scripts (create extensions, tune pg_hba, etc.)
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    networks:
      - backend-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Resource limits — tune to available host RAM
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'
    # Postgres port is NOT exposed to host — only reachable via backend-net
    security_opt:
      - no-new-privileges:true

  # ─── Redis 7 (cache + BullMQ broker) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    env_file:
      - path: .env
        required: true
    command:
      - redis-server
      # Require password auth
      - '--requirepass'
      - '${REDIS_PASSWORD}'
      # AOF persistence for durability
      - '--appendonly'
      - 'yes'
      - '--appendfsync'
      - 'everysec'
      # RDB snapshot every 60s if ≥1 write
      - '--save'
      - '60 1'
      # Limit memory to avoid OOM killing the host
      - '--maxmemory'
      - '${REDIS_MAX_MEMORY:-256mb}'
      - '--maxmemory-policy'
      - 'allkeys-lru'
      # Disable dangerous commands in production
      - '--rename-command'
      - 'CONFIG REDIS_CONFIG_${REDIS_CONFIG_TOKEN}'
      - '--rename-command'
      - 'FLUSHALL REDIS_FLUSHALL_${REDIS_CONFIG_TOKEN}'
      - '--rename-command'
      - 'DEBUG REDIS_DEBUG_${REDIS_CONFIG_TOKEN}'
    volumes:
      - redis_data:/data
    networks:
      - backend-net
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'
    security_opt:
      - no-new-privileges:true

  # ─── NestJS Backend ────────────────────────────────────────────────────────
  server:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_ORG:-notesaner}/server:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
      args:
        - NODE_ENV=production
    restart: always
    env_file:
      - path: .env
        required: true
    environment:
      NODE_ENV: production
      PORT: 4000
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      # Redis (used by both session cache and BullMQ)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      QUEUE_REDIS_HOST: redis
      QUEUE_REDIS_PORT: 6379
      QUEUE_REDIS_PASSWORD: ${REDIS_PASSWORD}
      # JWT — use strong secrets; rotate on breach
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-900}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL:-2592000}
      # CORS — must match the public frontend origin
      ALLOWED_ORIGINS: ${FRONTEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      # File storage (mounted volume)
      STORAGE_ROOT: /data/notes
      # Feature flags
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-false}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-true}
      # Observability
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_SERVICE_NAME: notesaner-server
      # Optional: GitHub Plugin Registry token
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # Optional SAML/OIDC (leave blank to disable)
      SAML_ENTITY_ID: ${SAML_ENTITY_ID:-}
      SAML_SSO_URL: ${SAML_SSO_URL:-}
      SAML_CERTIFICATE_PATH: ${SAML_CERTIFICATE_PATH:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
    volumes:
      - notes_data:/data/notes
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # The NestJS app exposes /health via @nestjs/terminus
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:4000/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: '100m'
        max-file: '10'
    security_opt:
      - no-new-privileges:true

  # ─── Next.js Frontend ──────────────────────────────────────────────────────
  web:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_ORG:-notesaner}/web:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        - NODE_ENV=production
        # Build-time public env vars baked into the Next.js bundle
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    restart: always
    env_file:
      - path: .env
        required: true
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: '0.0.0.0'
    networks:
      - frontend-net
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'
    security_opt:
      - no-new-privileges:true

  # ─── Nginx Reverse Proxy (SSL termination + routing) ──────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      # Redirect all HTTP to HTTPS
      - '${HTTP_PORT:-80}:80'
      # HTTPS (TLS termination)
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Drop site configs inside conf.d/
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # TLS certificates — populate via certbot/ACME before first start
      - nginx_certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - frontend-net
      - backend-net
    depends_on:
      web:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    logging:
      driver: json-file
      options:
        max-size: '100m'
        max-file: '10'
    security_opt:
      - no-new-privileges:true
