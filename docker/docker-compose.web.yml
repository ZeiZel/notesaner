# =============================================================================
# Notesaner — Web frontend service (Next.js 15)
# Dev: runs pre-built standalone output from dist/
# =============================================================================

services:
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      HOSTNAME: '0.0.0.0'
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:4000}
    ports:
      - '3000:3000'
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --spider -q http://localhost:3000 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles: ['dev', 'all']
